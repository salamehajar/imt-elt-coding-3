# =============================================================================
# TP4 — GitHub Actions CI/CD Pipeline
# =============================================================================
#
# HOW DOES GITHUB ACTIONS WORK?
# ------------------------------------
# GitHub Actions automatically runs code on each event in your repo
# (push, pull request, etc.). It's like a remote computer (Ubuntu) that:
#   1. Clones your repo
#   2. Installs Python + your dependencies
#   3. Runs your tests, your linter, etc.
#   4. Tells you if everything passed or failed
#
# WORKFLOW STRUCTURE:
#   - name:        Display name in GitHub "Actions" tab
#   - on:          When it triggers (push, pull_request...)
#   - jobs:        Tasks to run (each job runs on a separate machine)
#     - steps:     Steps in a job (executed sequentially)
#
# WHERE TO SEE RESULTS?
#   → GitHub → your repo → "Actions" tab → you'll see each run
#   → A green ✅ = everything passed, a red ❌ = something failed
#
# =============================================================================

name: ELT Pipeline CI

# WHEN to trigger the workflow?
on:
  push:
    branches: [main, master]      # à chaque push sur main ou master
  pull_request:
    branches: [main, master]      # à chaque pull request vers main ou master

jobs:
  test:
    # Which machine to run on? (Ubuntu = free Linux provided by GitHub)
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout repository
      # -----------------------------------------------------------------------
      # "uses" = use a pre-made GitHub Action
      # actions/checkout@v4 = clone your repo on the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2: Set up Python
      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # -----------------------------------------------------------------------
      # Step 3: Install dependencies
      # -----------------------------------------------------------------------
      # "run" = execute shell commands (like in your terminal)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

